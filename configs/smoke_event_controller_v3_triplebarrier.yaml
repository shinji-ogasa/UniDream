# Event-target controller probe with triple-barrier labels

data:
  symbol: "BTCUSDT"
  interval: "15m"
  train_years: 1
  val_months: 2
  test_months: 2
  seq_len: 64

normalization:
  zscore_window_days: 60

feature_extras:
  rebound_v1: true
  rebound_windows_hours: [24, 72]

costs:
  spread_bps: 3.0
  fee_rate: 0.0003
  slippage_bps: 1.0

cost_profiles:
  base:
    spread_bps: 3.0
    fee_rate: 0.0003
    slippage_bps: 1.0
  stress:
    spread_bps: 5.0
    fee_rate: 0.0004
    slippage_bps: 2.0

reward:
  beta: 0.1
  dsr_eta: 0.01
  mode: "excess_bh"
  benchmark_position: 1.0

targets:
  alpha_excess_pt: 5.0
  sharpe_delta: 0.20
  maxdd_delta_pt: -10.0
  win_rate_vs_bh: 0.60
  stretch_alpha_excess_pt: 8.0
  stretch_maxdd_delta_pt: -15.0

event_controller:
  label_mode: triple_barrier
  horizon: 16
  vol_lookback: 96
  barrier_mult: 1.5
  hidden_dim: 128
  dropout: 0.05
  epochs: 20
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 1.0e-4
  down_positions: [0.85, 0.90, 0.95]
  up_positions: [1.02, 1.05, 1.10]
  entry_thresholds: [0.55, 0.60, 0.65]
  exit_thresholds: [0.45, 0.50, 0.55]
  margins: [0.00, 0.05, 0.10]
  min_hold_bars_grid: [4, 8, 16]

logging:
  checkpoint_dir: "checkpoints/event_controller_v3_triplebarrier"
