# UniDream — Medium Configuration
# 数時間（GPU で 2〜4h）で完走できる本番寄り設定。
# フォールド数: 2020-01-01〜2024-01-01 → 約 5〜6 folds
#
# Usage:
#   uv run python train.py --config configs/medium.yaml --start 2020-01-01 --end 2024-01-01

# --- データ ---
data:
  symbol: "BTCUSDT"
  interval: "15m"
  train_years: 2
  val_months: 3
  test_months: 3
  seq_len: 64

# --- 正規化 ---
normalization:
  zscore_window_days: 60

# --- 行動空間 ---
actions:
  n: 5
  values: [-1.0, -0.5, 0.0, 0.5, 1.0]

# --- コスト・スリッページモデル ---
costs:
  spread_bps: 3.0
  fee_rate: 0.0003
  slippage_bps: 1.0

cost_profiles:
  base:
    spread_bps: 3.0
    fee_rate: 0.0003
    slippage_bps: 1.0
  stress:
    spread_bps: 5.0
    fee_rate: 0.0004
    slippage_bps: 2.0

# --- Oracle ---
oracle:
  discount: 1.0
  soft_label_temp: 0.5      # Boltzmann 温度（正規化 advantage ベース。0.5≈45%entropy、1.0≈76%）
  min_hold: 10              # 最低10バー（=2.5時間）保有を強制 → oracle avg_hold改善 → BC安定化

# --- 報酬 ---
reward:
  beta: 0.1
  dsr_eta: 0.01
  mode: "excess_bh"
  benchmark_position: 1.0

# --- 世界モデル ---
# アーキテクチャは本番と同一。ステップ数のみ削減。
world_model:
  encoder_hidden: 256
  encoder_layers: 2
  n_categoricals: 32
  n_classes: 32
  unimix_ratio: 0.01
  d_model: 512              # 本番と同一
  n_heads: 8                # 本番と同一
  n_layers: 4               # 本番と同一
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 256
  free_bits: 1.0
  dyn_scale: 0.5
  rep_scale: 0.1
  recon_scale: 1.0
  reward_scale: 1.0
  done_scale: 0.0               # 継続トレーディングでは done=0 固定のため無効化
  n_ensemble: 3
  disagree_scale: 0.1
  # Auxiliary losses（BC 表現品質向上）
  idm_scale: 0.3            # IDM (Inverse Dynamics Model) 損失係数
  return_scale: 0.1         # N-step return 予測損失係数
  return_horizon: 10        # N-step return の N
  lr: 1.0e-4
  batch_size: 64            # 本番 32→64（GPU メモリ効率向上）
  max_steps: 5000           # 本番 100k → 5k
  grad_clip: 100.0
  n_bins: 255
  bin_range: [-20.0, 20.0]

# --- BC 事前学習 ---
bc:
  n_epochs: 3               # 本番 5 → 3
  lr: 3.0e-4
  batch_size: 256
  sirl_hidden: 128
  label_smoothing: 0.10     # Soft labels（ε=0.10）→ argmax saturation 防止
  entropy_coef: 0.05        # Entropy bonus → OOS 分布崩壊防止（0.01→0.05 に強化）
  chunk_size: 3             # Action Chunking: 3バー分の行動を一括予測（avg_hold=3.3 に合わせる）
  class_balanced: true      # クラス逆頻度重み付き損失（long=100%崩壊防止）
  target_aux_coef: 1.50
  trade_aux_coef: 0.05
  band_aux_coef: 0.00

# --- Actor-Critic ---
ac:
  actor_hidden: 256
  critic_hidden: 256
  ac_layers: 2
  actor_dropout: 0.20       # Dropout（過学習防止・OOS 汎化）
  infer_temperature: 1.5    # 推論時 softmax 温度（T>1 で分布平滑化→constant output 防止）
  infer_trade_threshold: 0.45
  min_band: 0.02
  max_band: 0.20
  min_target_std: 0.05
  max_target_std: 0.25
  horizon: 5                # 本番 10 → 5（smoke test 3 より長く、本番より保守的）
  lam: 0.95
  gamma: 0.99
  ema_decay: 0.98
  alpha_init: 1.0
  alpha_final: 0.05
  alpha_decay_steps: 4800   # max_steps の 80% で alpha_final に到達
  entropy_scale: 1.0e-2
  td3bc_alpha: 2.5
  target_aux_coef: 1.25
  trade_aux_coef: 0.15
  band_aux_coef: 0.05
  turnover_coef: 0.15
  flow_change_coef: 0.05
  actor_lr: 1.0e-4
  online_wm_interval: 2000  # 本番 5000 → 2000
  online_wm_window_days: 30
  online_wm_steps: 50       # 本番 200 → 50
  use_dsr: true
  adaptive_bc: true
  critic_lr: 3.0e-4
  critic_pretrain_steps: 500  # 本番 2000 → 500
  max_steps: 6000           # 本番 200k → 6k（early stop 込みで実効 2〜4k 想定）
  checkpoint_interval: 1000   # 本番 10000 → 1000
  val_patience: 3           # 3 回連続更新なしで early stop
  bc_loss_threshold: 2.0    # BC loss がこの値を超えたら（α 低下時の自然増は許容）
  bc_loss_patience: 3       # 3 連続 checkpoint で early stop
  grad_clip: 100.0

# --- PPO ベースライン ---
ppo:
  n_epochs: 10
  batch_size: 64
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_steps: 50000
  grad_clip: 0.5

# --- 評価 ---
eval:
  pbo_n_trials: 100
  hmm_n_states: 3
  report_metrics:
    - sharpe
    - sortino
    - max_drawdown
    - calmar

# --- ロギング ---
logging:
  log_interval: 500
  eval_interval: 2000
  checkpoint_dir: "checkpoints/medium"
