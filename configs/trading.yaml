# UniDream — Trading Configuration
# すべてのハイパーパラメータをここで管理する

# --- データ ---
data:
  symbol: "BTCUSDT"
  interval: "15m"           # 15分足
  train_years: 2
  val_months: 3
  test_months: 3
  seq_len: 64               # コンテキスト窓（タイムステップ数）

# --- 正規化 ---
normalization:
  zscore_window_days: 60    # rolling z-score 窓（日数）← バー数への変換は interval から自動計算

# --- 行動空間 ---
actions:
  n: 5
  values: [-1.0, -0.5, 0.0, 0.5, 1.0]

# --- コスト・スリッページモデル ---
costs:
  spread_bps: 3.0           # base: bid-ask スプレッド (basis points)
  fee_rate: 0.0003          # base: 手数料率 (0.03%)
  slippage_bps: 1.0         # base: スリッページ (basis points per unit position change)

cost_profiles:
  base:
    spread_bps: 3.0
    fee_rate: 0.0003
    slippage_bps: 1.0
  stress:
    spread_bps: 5.0
    fee_rate: 0.0004
    slippage_bps: 2.0

# --- Oracle ---
oracle:
  discount: 1.0             # DP 割引率
  soft_label_temp: 0.5      # Boltzmann 温度（正規化 advantage ベース。0.5≈45%entropy、1.0≈76%）
  min_hold: 10              # 最低10バー（=2.5時間）保有を強制 → oracle avg_hold改善 → BC安定化

# --- 報酬 ---
reward:
  beta: 0.1                 # ΔDD ペナルティ係数
  dsr_eta: 0.01             # DSR EMA 係数
  mode: "excess_bh"
  benchmark_position: 1.0

# --- 世界モデル ---
world_model:
  # Encoder
  encoder_hidden: 256       # MLP 隠れ層次元
  encoder_layers: 2
  # Discrete latent
  n_categoricals: 32        # カテゴリカル分布の数
  n_classes: 32             # 各カテゴリの離散値数
  unimix_ratio: 0.01        # エントロピー正則化（均一混合比率）
  # Transformer
  d_model: 512              # Transformer 隠れ次元
  n_heads: 8
  n_layers: 4
  d_ff: 2048                # FFN 中間次元
  dropout: 0.1
  max_seq_len: 256
  # KL balancing
  free_bits: 1.0
  dyn_scale: 0.5
  rep_scale: 0.1
  # Loss weights
  recon_scale: 1.0
  reward_scale: 1.0
  done_scale: 0.0               # 継続トレーディングでは done=0 固定のため無効化
  # Ensemble
  n_ensemble: 3
  disagree_scale: 0.1       # 不一致ペナルティ係数
  # Auxiliary losses（BC 表現品質向上）
  idm_scale: 0.3            # IDM (Inverse Dynamics Model) 損失係数
  return_scale: 0.1         # N-step return 予測損失係数
  return_horizon: 10        # N-step return の N
  # Training
  lr: 1.0e-4
  batch_size: 64
  max_steps: 100000
  grad_clip: 100.0
  # Twohot reward/critic bins
  n_bins: 255
  bin_range: [-20.0, 20.0]  # symlog 空間での範囲

# --- BC 事前学習 ---
bc:
  n_epochs: 5
  lr: 3.0e-4
  batch_size: 256
  sirl_hidden: 128          # 状態依存重み MLP の隠れ次元
  label_smoothing: 0.10     # Soft labels（ε=0.10）→ argmax saturation 防止
  entropy_coef: 0.05        # Entropy bonus → OOS 分布崩壊防止（0.01→0.05 に強化）
  chunk_size: 3             # Action Chunking: 3バー分の行動を一括予測（avg_hold=3.3 に合わせる）
  class_balanced: true      # クラス逆頻度重み付き損失（long=100%崩壊防止）
  target_aux_coef: 1.00
  trade_aux_coef: 0.75      # trade / hold 補助 head を教師ありで安定化
  band_aux_coef: 0.25       # no-trade band head の符号学習

# --- Actor-Critic ---
ac:
  # 構造
  actor_hidden: 256
  critic_hidden: 256
  ac_layers: 2
  actor_dropout: 0.20       # Dropout（過学習防止・OOS 汎化）
  infer_temperature: 1.5    # 推論時 softmax 温度（T>1 で分布平滑化→constant output 防止）
  infer_trade_threshold: 0.45
  min_band: 0.02
  max_band: 0.20
  min_target_std: 0.05
  max_target_std: 0.25
  # Imagination（金融15分足では WM 予測精度が劣化するため H=5 が現実的）
  horizon: 5
  # λ-return
  lam: 0.95
  gamma: 0.99
  # Critic slow target
  ema_decay: 0.98
  # BC/AC 混合
  alpha_init: 1.0           # BC 損失の初期重み
  alpha_final: 0.05             # BC フロアを維持して actor 発散を防ぐ
  alpha_decay_steps: 100000
  # Entropy 正則化（collapse 防止。3e-4 は 5 択では AC loss の 0.1% 以下で機能しない）
  entropy_scale: 1.0e-2
  # TD3+BC 保守的制約
  td3bc_alpha: 2.5
  target_aux_coef: 1.00
  trade_aux_coef: 0.50
  band_aux_coef: 0.25
  # 最適化
  actor_lr: 1.0e-4
  online_wm_interval: 5000
  online_wm_window_days: 30
  online_wm_steps: 200
  use_dsr: true
  adaptive_bc: true
  critic_lr: 3.0e-4
  critic_pretrain_steps: 2000
  max_steps: 200000
  checkpoint_interval: 10000  # 何ステップごとに中間保存するか
  val_patience: 5           # 5 回連続更新なしで early stop（本番は余裕を持たせる）
  bc_loss_threshold: 2.0
  bc_loss_patience: 3
  grad_clip: 100.0

# --- PPO ベースライン ---
ppo:
  n_epochs: 10
  batch_size: 64
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_steps: 500000
  grad_clip: 0.5

# --- 評価 ---
eval:
  pbo_n_trials: 100         # PBO 計算のコンビネーション数
  hmm_n_states: 3
  report_metrics:
    - sharpe
    - sortino
    - max_drawdown
    - calmar

# --- ロギング ---
logging:
  log_interval: 1000
  eval_interval: 10000
  checkpoint_dir: "checkpoints"
