# UniDream — Trading Configuration
# すべてのハイパーパラメータをここで管理する

# --- データ ---
data:
  symbol: "BTCUSDT"
  interval: "15m"           # 15分足
  train_years: 2
  val_months: 3
  test_months: 3
  seq_len: 64               # コンテキスト窓（タイムステップ数）
  feature_dim: 12           # OHLCV(5) + log_return(1) + RSI(1) + MACD(2) + ATR(1) + vol_norm(1) + spread(1)
  zscore_window: 60         # rolling z-score 窓（日数）

# --- 正規化 ---
normalization:
  zscore_window: 60
  atr_norm: true            # ATR割りリターン正規化

# --- 行動空間 ---
actions:
  n: 5
  values: [-1.0, -0.5, 0.0, 0.5, 1.0]

# --- コスト・スリッページモデル ---
costs:
  spread_bps: 5.0           # bid-ask スプレッド (basis points)
  fee_rate: 0.0004          # 手数料率 (0.04%)
  slippage_bps: 2.0         # スリッページ (basis points per unit position change)

# --- Oracle ---
oracle:
  discount: 1.0             # DP 割引率

# --- 報酬 ---
reward:
  beta: 0.1                 # ΔDD ペナルティ係数
  dsr_eta: 0.01             # DSR EMA 係数

# --- 世界モデル ---
world_model:
  # Encoder
  encoder_hidden: 256       # MLP 隠れ層次元
  encoder_layers: 2
  # Discrete latent
  n_categoricals: 32        # カテゴリカル分布の数
  n_classes: 32             # 各カテゴリの離散値数
  unimix_ratio: 0.01        # エントロピー正則化（均一混合比率）
  # Transformer
  d_model: 512              # Transformer 隠れ次元
  n_heads: 8
  n_layers: 4
  d_ff: 2048                # FFN 中間次元
  dropout: 0.1
  max_seq_len: 256
  # KL balancing
  free_bits: 1.0
  dyn_scale: 0.5
  rep_scale: 0.1
  # Loss weights
  recon_scale: 1.0
  reward_scale: 1.0
  done_scale: 1.0
  # Ensemble
  n_ensemble: 3
  disagree_scale: 0.1       # 不一致ペナルティ係数
  # Training
  lr: 1.0e-4
  batch_size: 32
  seq_batch_len: 64
  max_steps: 100000
  grad_clip: 100.0
  # Twohot reward/critic bins
  n_bins: 255
  bin_range: [-20.0, 20.0]  # symlog 空間での範囲

# --- BC 事前学習 ---
bc:
  n_epochs: 5
  lr: 3.0e-4
  batch_size: 256
  sirl_hidden: 128          # 状態依存重み MLP の隠れ次元

# --- Actor-Critic ---
ac:
  # 構造
  actor_hidden: 256
  critic_hidden: 256
  ac_layers: 2
  # Imagination
  horizon: 3
  # λ-return
  lam: 0.95
  gamma: 0.99
  # Critic slow target
  ema_decay: 0.98
  # BC/AC 混合
  alpha_init: 1.0           # BC 損失の初期重み
  alpha_final: 0.0
  alpha_decay_steps: 50000
  # Entropy 正則化
  entropy_scale: 3.0e-4
  # TD3+BC 保守的制約
  td3bc_alpha: 2.5
  # 最適化
  actor_lr: 3.0e-5
  critic_lr: 3.0e-4
  max_steps: 200000
  grad_clip: 100.0

# --- PPO ベースライン ---
ppo:
  n_steps: 2048             # rollout 長
  n_epochs: 10
  batch_size: 64
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_steps: 500000
  grad_clip: 0.5

# --- 評価 ---
eval:
  pbo_n_trials: 100         # PBO 計算のコンビネーション数
  hmm_n_states: 3
  report_metrics:
    - sharpe
    - sortino
    - max_drawdown
    - calmar
  n_seeds: 5                # 再現性確認用シード数

# --- ロギング ---
logging:
  log_interval: 1000
  eval_interval: 10000
  checkpoint_dir: "checkpoints"
