data:
  symbol: BTCUSDT
  interval: 15m
  train_years: 2
  val_months: 3
  test_months: 3
  seq_len: 64
normalization:
  zscore_window_days: 60
actions:
  n: 3
  values:
  - 0.0
  - 0.5
  - 1.0
costs:
  spread_bps: 3.0
  fee_rate: 0.0003
  slippage_bps: 1.0
cost_profiles:
  base:
    spread_bps: 3.0
    fee_rate: 0.0003
    slippage_bps: 1.0
  stress:
    spread_bps: 5.0
    fee_rate: 0.0004
    slippage_bps: 2.0
oracle:
  discount: 1.0
  soft_label_temp: 0.5
  min_hold: 64
  action_values:
  - 0.0
  - 0.5
  - 1.0
  - 1.25
  teacher_mode: signal_aim
  use_aim_targets: true
  signal_floor_position: 0.0
  signal_ceiling_position: 1.25
  signal_scale: 1.2
  signal_deadzone: 0.15
  signal_clip: 4.0
  signal_horizons:
  - 4
  - 16
  - 64
  signal_horizon_weights:
  - 0.2
  - 0.3
  - 0.5
  signal_downside_horizon: 16
  signal_downside_weight: 0.0
  aim_max_step: 0.1
  aim_band: 0.02
  aim_underweight_confirm_bars: 8
  aim_underweight_min_scale: 0.25
  aim_underweight_step_scale: 0.5
reward:
  beta: 0.1
  dsr_eta: 0.01
  mode: excess_bh
  benchmark_position: 1.0
world_model:
  encoder_hidden: 256
  encoder_layers: 2
  n_categoricals: 32
  n_classes: 32
  unimix_ratio: 0.01
  d_model: 256
  n_heads: 4
  n_layers: 2
  d_ff: 1024
  dropout: 0.1
  max_seq_len: 128
  free_bits: 1.0
  dyn_scale: 0.5
  rep_scale: 0.1
  recon_scale: 1.0
  reward_scale: 1.0
  done_scale: 0.0
  n_ensemble: 2
  disagree_scale: 0.1
  idm_scale: 0.3
  return_scale: 2.0
  return_horizon: 10
  lr: 0.0001
  batch_size: 64
  max_steps: 1500
  grad_clip: 100.0
  n_bins: 255
  bin_range:
  - -20.0
  - 20.0
  return_horizons:
  - 1
  - 4
  - 8
  - 16
  - 32
  return_include_current: false
  return_target_scale: 100.0
  vol_scale: 1.0
  drawdown_scale: 1.0
  risk_horizons:
  - 1
  - 4
  - 8
  - 16
  - 32
  risk_target_scale: 100.0
bc:
  n_epochs: 8
  lr: 0.0003
  batch_size: 256
  sirl_hidden: 0
  label_smoothing: 0.0
  entropy_coef: 0.02
  chunk_size: 4
  class_balanced: false
  target_aux_coef: 0.25
  trade_aux_coef: 0.15
  execution_aux_coef: 0.2
  residual_target_coef: 0.75
  residual_aux_ce_coef: 0.0
  position_mean_match_coef: 0.0
  short_mass_match_coef: 0.0
  mode_target_coef: 0.0
  mode_target_margin: 0.1
  mode_target_neutral_margin: 0.02
  mode_target_gap_min: 0.1
  mode_rate_match_coef: 0.0
  mode_regime_rate_match_coef: 0.0
  dual_head_anchor_coef: 0.0
  dual_head_underweight_coef: 0.0
  dual_head_separation_coef: 0.0
  dual_head_neutral_margin: 0.02
  dual_head_underweight_margin: 0.1
  dual_head_separation_margin: 0.05
  band_aux_coef: 0.05
  band_aux_trade_only: true
  direct_band_target_coef: 0.1
  direct_band_trade_only: true
  direct_band_gap_min: 0.1
  direct_band_margin: 0.1
  direct_hold_band_margin: 0.0
  transition_advantage_relabel: false
  transition_route_labels: true
  transition_route_margin: 0.0005
  route_adv_tau: 0.001
  route_label_smoothing: 0.05
  route_target_coef: 3.0
  route_advantage_weight_coef: 0.5
  route_advantage_clip: 2.0
  route_entropy_coef: 0.0
  transition_candidate_actions:
  - 0.5
  - 1.0
  - 1.25
  transition_advantage_horizons:
  - 4
  - 8
  - 16
  - 32
  transition_advantage_horizon_weights:
  - 0.1
  - 0.2
  - 0.3
  - 0.4
  transition_advantage_margin: 0.0005
  transition_drawdown_penalty_coef: 0.25
  transition_volatility_penalty_coef: 0.1
  transition_turnover_penalty_coef: 0.0
  transition_leverage_penalty_coef: 4.0e-05
  sample_quality_mode: outcome_edge
  sample_quality_coef: 0.25
  sample_quality_clip: 2.0
  recovery_trade_coef: 0.0
  recovery_band_coef: 0.0
  recovery_target_coef: 0.0
  recovery_execution_coef: 0.0
  transition_relabel_smooth: true
  transition_relabel_max_step: 0.1
  transition_relabel_band: 0.02
  transition_relabel_underweight_confirm_bars: 16
  transition_relabel_underweight_min_scale: 0.5
  transition_relabel_underweight_step_scale: 0.5
ac:
  actor_hidden: 256
  critic_hidden: 256
  ac_layers: 2
  actor_dropout: 0.1
  controller_state_dim: 1
  residual_controller: true
  use_route_controller: true
  route_dim: 4
  route_max_step: 0.10
  route_delta_scale: 0.02
  route_neutral_init_bias: 1.0
  use_dual_residual_controller: false
  use_regime_target_bias: false
  regime_target_bias_scale: 0.5
  use_regime_residual_shift: false
  regime_residual_shift_scale: 0.0
  residual_min_overlay: -1.0
  residual_max_overlay: 0.25
  residual_init_overlay: 0.0
  infer_temperature: 1.0
  infer_trade_threshold: 0.7
  infer_gap_boost: 0.0
  infer_direct_target_track: false
  infer_target_from_logits: false
  infer_logits_target_blend: 0.0
  infer_direct_track_scale: 1.0
  val_adjust_rate_scale_grid:
  - 0.25
  - 0.5
  - 0.75
  - 1.0
  selector_max_turnover: 6.0
  max_position_step: 0.10
  abs_min_position: 0.0
  abs_max_position: 1.25
  min_band: 0.02
  max_band: 0.2
  min_target_std: 0.05
  max_target_std: 0.25
  horizon: 5
  lam: 0.95
  gamma: 0.99
  ema_decay: 0.98
  alpha_init: 1.0
  alpha_final: 0.2
  alpha_decay_steps: 800
  entropy_scale: 0.01
  td3bc_alpha: 2.5
  target_aux_coef: 1.5
  trade_aux_coef: 0.15
  band_aux_coef: 0.05
  prior_kl_coef: 0.1
  prior_trade_coef: 0.05
  prior_band_coef: 0.02
  prior_flow_coef: 0.2
  turnover_coef: 0.25
  flow_change_coef: 0.1
  positive_advantages: true
  actor_lr: 3.0e-05
  online_wm_interval: 500
  online_wm_window_days: 30
  online_wm_steps: 25
  use_dsr: true
  adaptive_bc: true
  critic_lr: 0.0003
  critic_pretrain_steps: 250
  max_steps: 0
  checkpoint_interval: 250
  val_patience: 4
  bc_loss_threshold: 0.0
  bc_loss_patience: 2
  grad_clip: 100.0
  advantage_conditioned: false
eval:
  pbo_n_trials: 50
  hmm_n_states: 3
  regime_source: feature_stress_tri
  report_metrics:
  - sharpe
  - sortino
  - max_drawdown
  - calmar
logging:
  log_interval: 100
  eval_interval: 250
  checkpoint_dir: checkpoints/bc_true_routing_k_s007
