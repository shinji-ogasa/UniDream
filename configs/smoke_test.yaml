# UniDream — Smoke Test Configuration
# パイプライン全体の動作確認用。ステップ数を大幅に削減。
# Usage: uv run python train.py --config configs/smoke_test.yaml --start 2022-01-01 --end 2023-06-01

data:
  symbol: "BTCUSDT"
  interval: "15m"
  train_years: 1
  val_months: 2
  test_months: 2
  seq_len: 64

normalization:
  zscore_window_days: 60

actions:
  n: 5
  values: [-1.0, -0.5, 0.0, 0.5, 1.0]

costs:
  spread_bps: 3.0
  fee_rate: 0.0003
  slippage_bps: 1.0

cost_profiles:
  base:
    spread_bps: 3.0
    fee_rate: 0.0003
    slippage_bps: 1.0
  stress:
    spread_bps: 5.0
    fee_rate: 0.0004
    slippage_bps: 2.0

oracle:
  discount: 1.0
  soft_label_temp: 0.5      # Boltzmann 温度（medium と同一）
  min_hold: 10              # 最低10バー保有を強制

reward:
  beta: 0.1
  dsr_eta: 0.01
  mode: "excess_bh"
  benchmark_position: 1.0

world_model:
  encoder_hidden: 256
  encoder_layers: 2
  n_categoricals: 32
  n_classes: 32
  unimix_ratio: 0.01
  d_model: 256             # 本番の半分
  n_heads: 4               # 本番の半分
  n_layers: 2              # 本番の半分
  d_ff: 1024               # 本番の半分
  dropout: 0.1
  max_seq_len: 128
  free_bits: 1.0
  dyn_scale: 0.5
  rep_scale: 0.1
  recon_scale: 1.0
  reward_scale: 1.0
  done_scale: 0.0               # 継続トレーディングでは done=0 固定のため無効化
  n_ensemble: 2             # 本番より少なく
  disagree_scale: 0.1
  idm_scale: 0.3
  return_scale: 0.1
  return_horizon: 10
  lr: 1.0e-4
  batch_size: 32
  max_steps: 500            # 本番の 1/200
  grad_clip: 100.0
  n_bins: 255
  bin_range: [-20.0, 20.0]

bc:
  n_epochs: 1               # 本番の 1/5
  lr: 3.0e-4
  batch_size: 256
  sirl_hidden: 128
  label_smoothing: 0.10
  entropy_coef: 0.05
  chunk_size: 3
  class_balanced: true
  trade_aux_coef: 0.75      # trade / hold head を強めに教師あり学習
  band_aux_coef: 0.25       # no-trade band head の符号学習

ac:
  actor_hidden: 256
  critic_hidden: 256
  ac_layers: 2
  actor_dropout: 0.20
  infer_temperature: 1.0    # BC 収束前は 1.0 固定（1.5 は logits が分散した状態でスイッチング爆発を招く）
  infer_trade_threshold: 0.50
  switch_margin: 0.08       # best action と現保有 action の確率差が小さい場合は据え置く
  max_position_step: 0.5    # 1 バーでの在庫変化を 0.5 までに制限
  horizon: 3
  lam: 0.95
  gamma: 0.99
  ema_decay: 0.98
  alpha_init: 1.0
  alpha_final: 0.15             # smoke は BC floor をやや高めに残して collapse を防ぐ
  alpha_decay_steps: 1500
  entropy_scale: 1.0e-2
  td3bc_alpha: 2.5
  trade_aux_coef: 0.50
  band_aux_coef: 0.25
  actor_lr: 5.0e-5
  online_wm_interval: 200   # AC steps ごとに WM をオンライン更新
  online_wm_window_days: 30 # 更新に使う直近日数
  online_wm_steps: 20       # WM 更新のステップ数
  use_dsr: true             # DSR 報酬を使用する
  adaptive_bc: true         # val Sharpe に応じて alpha 減衰を適応
  critic_lr: 3.0e-4
  critic_pretrain_steps: 200  # 本番の 1/10
  max_steps: 1000           # 本番の 1/200
  checkpoint_interval: 200  # 本番の 1/50
  val_patience: 4           # 4 回連続更新なしで early stop（5 checkpoint 中 step800 の改善を逃さない設定）
  bc_loss_threshold: 2.0    # BC loss がこの値を超えたら（α 低下時の自然増は許容）
  bc_loss_patience: 3       # 3 連続 checkpoint で early stop
  grad_clip: 100.0

qdt:
  n_epochs: 20              # QDT 用エポック数（bc.n_epochs とは独立）
  batch_size: 64
  lr: 3.0e-4

ppo:
  n_epochs: 3
  batch_size: 64
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_steps: 5000           # 本番の 1/100
  grad_clip: 0.5

eval:
  pbo_n_trials: 50
  hmm_n_states: 3
  report_metrics:
    - sharpe
    - sortino
    - max_drawdown
    - calmar

logging:
  log_interval: 100
  eval_interval: 500
  checkpoint_dir: "checkpoints/smoke_test"
