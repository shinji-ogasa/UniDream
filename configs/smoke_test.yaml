# UniDream — Smoke Test Configuration
# パイプライン全体の動作確認用。ステップ数を大幅に削減。
# Usage: uv run python train.py --config configs/smoke_test.yaml --start 2022-01-01 --end 2023-06-01

data:
  symbol: "BTCUSDT"
  interval: "15m"
  train_years: 1
  val_months: 2
  test_months: 2
  seq_len: 64

normalization:
  zscore_window_days: 60

actions:
  n: 5
  values: [-1.0, -0.5, 0.0, 0.5, 1.0]

costs:
  spread_bps: 5.0
  fee_rate: 0.0004
  slippage_bps: 2.0

oracle:
  discount: 1.0

reward:
  beta: 0.1
  dsr_eta: 0.01

world_model:
  encoder_hidden: 256
  encoder_layers: 2
  n_categoricals: 32
  n_classes: 32
  unimix_ratio: 0.01
  d_model: 256             # 本番の半分
  n_heads: 4               # 本番の半分
  n_layers: 2              # 本番の半分
  d_ff: 1024               # 本番の半分
  dropout: 0.1
  max_seq_len: 128
  free_bits: 1.0
  dyn_scale: 0.5
  rep_scale: 0.1
  recon_scale: 1.0
  reward_scale: 1.0
  done_scale: 1.0
  n_ensemble: 2             # 本番より少なく
  disagree_scale: 0.1
  lr: 1.0e-4
  batch_size: 32
  max_steps: 500            # 本番の 1/200
  grad_clip: 100.0
  n_bins: 255
  bin_range: [-20.0, 20.0]

bc:
  n_epochs: 1               # 本番の 1/5
  lr: 3.0e-4
  batch_size: 256
  sirl_hidden: 128

ac:
  actor_hidden: 256
  critic_hidden: 256
  ac_layers: 2
  horizon: 5
  lam: 0.95
  gamma: 0.99
  ema_decay: 0.98
  alpha_init: 1.0
  alpha_final: 0.0
  alpha_decay_steps: 500
  entropy_scale: 3.0e-4
  td3bc_alpha: 2.5
  actor_lr: 3.0e-5
  critic_lr: 3.0e-4
  max_steps: 1000           # 本番の 1/200
  grad_clip: 100.0

ppo:
  n_epochs: 3
  batch_size: 64
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_steps: 5000           # 本番の 1/100
  grad_clip: 0.5

eval:
  pbo_n_trials: 50
  hmm_n_states: 3
  report_metrics:
    - sharpe
    - sortino
    - max_drawdown
    - calmar

logging:
  log_interval: 100
  eval_interval: 500
  checkpoint_dir: "checkpoints/smoke_test"
