run:
  start: "2018-01-01"
  end: "2024-01-01"
  folds: all
  clean_checkpoint_dir: true
  deterministic_algorithms: true

ac:
  abs_max_position: 1.25
  abs_min_position: 0.0
  ac_layers: 2
  actor_dropout: 0.1
  actor_hidden: 256
  actor_lr: 3.0e-05
  batch_size: 512
  adaptive_bc: true
  advantage_input_mode: route_gate
  alpha_decay_steps: 260
  alpha_final: 0.01
  alpha_init: 0.30
  band_aux_coef: 0.05
  bc_loss_patience: 2
  checkpoint_interval: 150
  controller_state_dim: 4
  critic_hidden: 256
  critic_lr: 0.0003
  critic_pretrain_steps: 0
  dd_budget: 0.002
  dd_budget_coef: 1.5
  dd_level_coef: 0.25
  downside_coef: 0.05
  edge_overlay_coef: 0.020
  edge_state_center: 0.0
  edge_state_indices:
  - 10
  - 11
  - 12
  - 13
  - 14
  edge_state_scale: 1.0
  ema_decay: 0.98
  entropy_scale: 0.005
  flow_change_coef: 0.10
  gamma: 0.99
  grad_clip: 100.0
  horizon: 8
  infer_temperature: 1.0
  infer_trade_threshold: 0.7
  inventory_recovery_gap: 0.05
  inventory_recovery_init_bias: -1.5
  inventory_recovery_logit_boost: 0.5
  inventory_recovery_max_step: 0.05
  inventory_recovery_min_duration: 8
  lam: 0.95
  logwealth_coef: 1.0
  max_band: 0.2
  max_position_step: 0.05
  max_steps: 600
  max_target_std: 0.25
  min_band: 0.02
  min_target_std: 0.05
  online_wm_interval: 0
  overlay_l2_coef: 0.02
  positive_advantages: false
  prior_band_coef: 0.005
  prior_flow_coef: 0.03
  prior_kl_coef: 0.01
  prior_trade_coef: 0.005
  restore_best_val_checkpoint: false
  residual_controller: true
  residual_max_overlay: 0.25
  residual_min_overlay: -1.0
  reward_objective: risk_budget
  risk_state_center: 0.0
  risk_state_exposure_coef: 0.04
  risk_state_indices:
  - 5
  - 6
  - 7
  - 8
  - 9
  risk_state_scale: 1.0
  risk_tilt_coef: 0.020
  route_advantage_gate_scale: 0.5
  route_delta_scale: 0.005
  route_dim: 3
  route_max_step: 0.05
  route_max_step_by_route:
    de_risk: 0.05
    neutral: 0.0
    overweight: 0.05
  route_neutral_init_bias: 0.5
  selector_max_turnover: 4.5
  selector_win_rate_metric: period
  tail_coef: 0.10
  tail_margin: 0.0
  target_aux_coef: 1.5
  short_l1_coef: 0.010
  td3bc_alpha: 0.45
  terminal_dd_coef: 0.10
  trade_aux_coef: 0.15
  turnover_coef: 0.25
  use_benchmark_exposure_floor: false
  use_benchmark_overweight_adapter: false
  benchmark_overweight_advantage_index: 10
  benchmark_overweight_advantage_min: 0.25
  benchmark_overweight_delta_range: 0.10
  benchmark_overweight_epsilon: 0.15
  benchmark_overweight_long_rate_max: 0.15
  benchmark_overweight_max_position: 1.20
  benchmark_overweight_min_hold_bars: 0
  benchmark_overweight_min_position: 0.80
  benchmark_overweight_require_base_near_bench: false
  benchmark_overweight_trainable_delta_range: 0.06
  benchmark_overweight_underweight_duration_max: 1.0
  use_dsr: false
  use_inventory_recovery_controller: true
  use_route_controller: true
  use_state_machine_route: false
  use_trainable_benchmark_overweight_sizing_adapter: true
  use_wm_predictive_state: true
  val_adjust_rate_scale_grid:
  - 0.5
  val_patience: 3
  wm_predictive_state_clip: 5.0
  wm_predictive_state_heads:
  - vol
  - drawdown
  - overweight_advantage
  - recovery
  wm_predictive_state_scale: 0.35
  wm_predictive_state_standardize: true
  curriculum:
  - name: risk_sizing_warmup
    until_step: 120
    critic_only: false
    trainable_actor_prefixes:
    - route_head
    - route_delta_head
    - trade_head
    - band_head
    actor_lr: 1.0e-05
    td3bc_alpha: 1.2
    turnover_coef: 0.30
    flow_change_coef: 0.12
    risk_state_exposure_coef: 0.08
    overlay_l2_coef: 0.03
  - name: risk_overlay_full
    until_step: 600
    critic_only: false
    trainable_actor_prefixes:
    - route_head
    - route_delta_head
    - route_advantage_gate
    - inventory_recovery_head
    - residual_head
    - trade_head
    - band_head
    - target_std_head
    actor_lr: 3.0e-05
    edge_overlay_coef: 0.020
    risk_tilt_coef: 0.020
    td3bc_alpha: 0.35
    turnover_coef: 0.18
    flow_change_coef: 0.08
    risk_state_exposure_coef: 0.05
    overlay_l2_coef: 0.02
actions:
  values:
  - 0.0
  - 0.5
  - 1.0
  - 1.25
bc:
  band_aux_coef: 0.05
  band_aux_trade_only: true
  batch_size: 512
  chunk_size: 4
  class_balanced: false
  direct_band_gap_min: 0.1
  direct_band_margin: 0.1
  direct_band_target_coef: 0.1
  direct_band_trade_only: true
  direct_hold_band_margin: 0.0
  entropy_coef: 0.02
  execution_aux_coef: 0.2
  inventory_recovery_coef: 4.0
  inventory_recovery_pos_weight: 10.0
  inventory_recovery_target_margin: 0.02
  inventory_recovery_underweight_margin: 0.05
  label_smoothing: 0.0
  lr: 0.0003
  n_epochs: 4
  residual_target_coef: 1.0
  route_adv_tau: 0.002
  route_advantage_clip: 2.0
  route_advantage_weight_coef: 0.5
  route_class_weights:
    de_risk: 1.2
    neutral: 0.8
    overweight: 1.1
  route_entropy_coef: 0.002
  route_focal_gamma: 0.5
  route_label_smoothing: 0.08
  route_target_coef: 4.0
  sample_quality_clip: 2.0
  sample_quality_coef: 0.5
  sample_quality_mode: outcome_edge
  sirl_hidden: 0
  target_aux_coef: 0.35
  trade_aux_coef: 0.15
  transition_advantage_horizon_weights:
  - 0.15
  - 0.25
  - 0.35
  - 0.25
  transition_advantage_horizons:
  - 4
  - 8
  - 16
  - 32
  transition_advantage_margin: 0.0005
  transition_advantage_relabel: true
  transition_candidate_actions:
  - 0.5
  - 1.0
  - 1.25
  transition_drawdown_penalty_coef: 0.35
  transition_leverage_penalty_coef: 0.00008
  transition_relabel_band: 0.02
  transition_relabel_max_step: 0.1
  transition_relabel_smooth: true
  transition_relabel_underweight_confirm_bars: 16
  transition_relabel_underweight_min_scale: 0.5
  transition_relabel_underweight_step_scale: 0.5
  transition_route_labels: true
  transition_route_margins:
    de_risk: 0.0003
    neutral: 0.0005
    overweight: 0.0010
    recovery: 0.0001
  transition_route_penalties:
    de_risk: 0.0
    overweight: 0.0003
    recovery: -0.0001
  transition_volatility_penalty_coef: 0.18
costs:
  fee_rate: 0.0003
  slippage_bps: 1.0
  spread_bps: 3.0
data:
  include_funding: true
  include_oi: false
  include_mark: true
  interval: 15m
  seq_len: 64
  symbol: BTCUSDT
  test_months: 3
  train_years: 2
  val_months: 3
eval:
  hmm_n_states: 3
  pbo_n_trials: 50
  regime_source: feature_stress_tri
  report_metrics:
  - sharpe
  - sortino
  - max_drawdown
  - calmar
logging:
  cache_dir: checkpoints/data_cache
  checkpoint_dir: checkpoints/plan010_edge_allocator_s007
  eval_interval: 150
  log_interval: 75
normalization:
  zscore_window_days: 60
oracle:
  action_values:
  - 0.0
  - 0.5
  - 1.0
  - 1.25
  aim_band: 0.02
  aim_max_step: 0.1
  aim_underweight_confirm_bars: 8
  aim_underweight_min_scale: 0.25
  aim_underweight_step_scale: 0.5
  discount: 1.0
