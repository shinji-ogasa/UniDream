# Order-flow aware risk regression probe

data:
  symbol: "BTCUSDT"
  interval: "15m"
  train_years: 1
  val_months: 2
  test_months: 2
  seq_len: 64

normalization:
  zscore_window_days: 60

feature_extras:
  rebound_v1: true
  rebound_windows_hours: [24, 72]
  funding_context_v1: true
  funding_context_windows_hours: [8, 24, 72]

costs:
  spread_bps: 3.0
  fee_rate: 0.0003
  slippage_bps: 1.0

cost_profiles:
  base:
    spread_bps: 3.0
    fee_rate: 0.0003
    slippage_bps: 1.0
  stress:
    spread_bps: 5.0
    fee_rate: 0.0004
    slippage_bps: 2.0

reward:
  beta: 0.1
  dsr_eta: 0.01
  mode: "excess_bh"
  benchmark_position: 1.0

targets:
  alpha_excess_pt: 5.0
  sharpe_delta: 0.20
  maxdd_delta_pt: -10.0
  win_rate_vs_bh: 0.60
  stretch_alpha_excess_pt: 8.0
  stretch_maxdd_delta_pt: -15.0

risk_controller:
  horizon: 16
  feature_subset_allow_missing: false
  feature_subset:
    - basis
    - basis_mom
    - funding_rate
    - fund_z_288
    - rv_16
    - signed_order_flow
    - taker_imbalance
    - exchange_netflow
    - macd_signal
  hidden_dim: 0
  dropout: 0.00
  epochs: 16
  batch_size: 256
  lr: 1.0e-3
  weight_decay: 5.0e-4
  down_positions: [0.90, 0.95]
  up_positions: [1.00, 1.02]
  down_entry_grid: [0.0075, 0.0100, 0.0125]
  up_entry_grid: [0.0075, 0.0100]
  exit_band_grid: [0.0025, 0.0050]
  margin_grid: [0.0000, 0.0025, 0.0050]
  min_hold_bars_grid: [8, 16, 24]

logging:
  checkpoint_dir: "checkpoints/risk_controller_v6_orderflow"
