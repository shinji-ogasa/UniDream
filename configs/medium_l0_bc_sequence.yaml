data:
  symbol: "BTCUSDT"
  interval: "15m"
  train_years: 2
  val_months: 3
  test_months: 3
  seq_len: 64

normalization:
  zscore_window_days: 60

actions:
  n: 3
  values: [0.0, 0.5, 1.0]

costs:
  spread_bps: 3.0
  fee_rate: 0.0003
  slippage_bps: 1.0

cost_profiles:
  base:
    spread_bps: 3.0
    fee_rate: 0.0003
    slippage_bps: 1.0
  stress:
    spread_bps: 5.0
    fee_rate: 0.0004
    slippage_bps: 2.0

oracle:
  discount: 1.0
  soft_label_temp: 0.5
  min_hold: 64
  action_values: [0.0, 0.5, 1.0]
  teacher_mode: "feature_stress"
  stress_floor_position: 0.0
  stress_ceiling_position: 1.0
  stress_entry_threshold: 0.10
  stress_signal_scale: 1.25
  stress_fast_vol_threshold: 0.75
  stress_slow_vol_threshold: 0.75
  stress_shock_threshold: 0.75
  stress_drift_threshold: 0.25
  stress_trend_threshold: 0.15
  stress_funding_threshold: -0.25
  stress_fast_vol_weight: 0.45
  stress_slow_vol_weight: 0.25
  stress_shock_weight: 0.20
  stress_drift_weight: 0.10
  stress_trend_weight: 0.20
  stress_funding_weight: 0.05

reward:
  beta: 0.1
  dsr_eta: 0.01
  mode: "excess_bh"
  benchmark_position: 1.0

world_model:
  encoder_hidden: 256
  encoder_layers: 2
  n_categoricals: 32
  n_classes: 32
  unimix_ratio: 0.01
  d_model: 256
  n_heads: 4
  n_layers: 2
  d_ff: 1024
  dropout: 0.1
  max_seq_len: 128
  free_bits: 1.0
  dyn_scale: 0.5
  rep_scale: 0.1
  recon_scale: 1.0
  reward_scale: 1.0
  done_scale: 0.0
  n_ensemble: 2
  disagree_scale: 0.1
  idm_scale: 0.3
  return_scale: 0.1
  return_horizon: 10
  lr: 1.0e-4
  batch_size: 64
  max_steps: 250
  grad_clip: 100.0
  n_bins: 255
  bin_range: [-20.0, 20.0]

bc:
  n_epochs: 4
  lr: 3.0e-4
  batch_size: 256
  sirl_hidden: 0
  label_smoothing: 0.00
  entropy_coef: 0.05
  chunk_size: 8
  class_balanced: false
  target_aux_coef: 2.00
  trade_aux_coef: 0.40
  band_aux_coef: 0.15
  execution_aux_coef: 0.25
  path_aux_coef: 0.50
  path_horizon: 8
  path_position_coef: 1.00
  path_turnover_coef: 0.10
  path_shortfall_coef: 0.25

ac:
  actor_hidden: 256
  critic_hidden: 256
  ac_layers: 2
  actor_dropout: 0.10
  infer_temperature: 1.0
  infer_trade_threshold: 0.70
  infer_gap_boost: 0.00
  max_position_step: 1.00
  abs_min_position: 0.0
  abs_max_position: 1.0
  min_band: 0.02
  max_band: 0.20
  min_target_std: 0.05
  max_target_std: 0.25
  horizon: 5
  lam: 0.95
  gamma: 0.99
  ema_decay: 0.98
  alpha_init: 1.0
  alpha_final: 0.20
  alpha_decay_steps: 250
  entropy_scale: 1.0e-2
  td3bc_alpha: 2.5
  target_aux_coef: 1.50
  trade_aux_coef: 0.15
  band_aux_coef: 0.05
  prior_kl_coef: 0.10
  prior_trade_coef: 0.05
  prior_band_coef: 0.02
  prior_flow_coef: 0.20
  turnover_coef: 0.25
  flow_change_coef: 0.10
  positive_advantages: true
  actor_lr: 3.0e-5
  online_wm_interval: 250
  online_wm_window_days: 30
  online_wm_steps: 10
  use_dsr: true
  adaptive_bc: true
  critic_lr: 3.0e-4
  critic_pretrain_steps: 100
  max_steps: 250
  checkpoint_interval: 125
  val_patience: 2
  bc_loss_threshold: 0.0
  bc_loss_patience: 1
  grad_clip: 100.0

qdt:
  n_epochs: 20
  batch_size: 64
  lr: 3.0e-4

ppo:
  n_epochs: 5
  batch_size: 64
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_steps: 10000
  grad_clip: 0.5

eval:
  pbo_n_trials: 100
  hmm_n_states: 3
  report_metrics:
    - sharpe
    - sortino
    - max_drawdown
    - calmar

logging:
  log_interval: 100
  eval_interval: 125
  checkpoint_dir: "checkpoints/medium_l0_bc_sequence"
