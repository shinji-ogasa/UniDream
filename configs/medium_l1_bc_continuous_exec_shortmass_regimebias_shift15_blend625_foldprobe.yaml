data:
  symbol: "BTCUSDT"
  interval: "15m"
  train_years: 2
  val_months: 3
  test_months: 3
  seq_len: 64

normalization:
  zscore_window_days: 60

actions:
  n: 3
  values: [0.0, 0.5, 1.0]

costs:
  spread_bps: 3.0
  fee_rate: 0.0003
  slippage_bps: 1.0

cost_profiles:
  base:
    spread_bps: 3.0
    fee_rate: 0.0003
    slippage_bps: 1.0
  stress:
    spread_bps: 5.0
    fee_rate: 0.0004
    slippage_bps: 2.0

oracle:
  discount: 1.0
  soft_label_temp: 0.5
  min_hold: 64
  action_values: [0.0, 0.5, 1.0]
  teacher_mode: "signal_aim"
  use_aim_targets: true
  signal_floor_position: 0.0
  signal_ceiling_position: 1.0
  signal_scale: 1.2
  signal_deadzone: 0.15
  signal_clip: 4.0
  signal_horizons: [4, 16, 64]
  signal_horizon_weights: [0.2, 0.3, 0.5]
  signal_downside_horizon: 16
  signal_downside_weight: 0.0
  aim_max_step: 0.10
  aim_band: 0.02
  aim_underweight_confirm_bars: 8
  aim_underweight_min_scale: 0.25
  aim_underweight_step_scale: 0.50

reward:
  beta: 0.1
  dsr_eta: 0.01
  mode: "excess_bh"
  benchmark_position: 1.0

world_model:
  encoder_hidden: 256
  encoder_layers: 2
  n_categoricals: 32
  n_classes: 32
  unimix_ratio: 0.01
  d_model: 256
  n_heads: 4
  n_layers: 2
  d_ff: 1024
  dropout: 0.1
  max_seq_len: 128
  free_bits: 1.0
  dyn_scale: 0.5
  rep_scale: 0.1
  recon_scale: 1.0
  reward_scale: 1.0
  done_scale: 0.0
  n_ensemble: 2
  disagree_scale: 0.1
  idm_scale: 0.3
  return_scale: 0.1
  return_horizon: 10
  lr: 1.0e-4
  batch_size: 64
  max_steps: 250
  grad_clip: 100.0
  n_bins: 255
  bin_range: [-20.0, 20.0]

bc:
  n_epochs: 8
  lr: 3.0e-4
  batch_size: 256
  sirl_hidden: 0
  label_smoothing: 0.00
  entropy_coef: 0.02
  chunk_size: 4
  class_balanced: false
  target_aux_coef: 1.20
  trade_aux_coef: 0.30
  band_aux_coef: 0.10
  execution_aux_coef: 0.75
  residual_target_coef: 4.0
  residual_aux_ce_coef: 0.0
  position_mean_match_coef: 1.0
  short_mass_match_coef: 2.0

ac:
  actor_hidden: 256
  critic_hidden: 256
  ac_layers: 2
  actor_dropout: 0.10
  controller_state_dim: 1
  residual_controller: true
  use_regime_target_bias: true
  regime_target_bias_scale: 0.50
  use_regime_residual_shift: true
  regime_residual_shift_scale: 0.15
  residual_min_overlay: -1.0
  residual_max_overlay: 0.0
  residual_init_overlay: -0.15
  infer_temperature: 1.0
  infer_trade_threshold: 0.70
  infer_gap_boost: 0.00
  infer_direct_target_track: false
  infer_target_from_logits: true
  infer_logits_target_blend: 0.625
  infer_direct_track_scale: 1.0
  max_position_step: 1.00
  abs_min_position: 0.0
  abs_max_position: 1.0
  min_band: 0.02
  max_band: 0.20
  min_target_std: 0.05
  max_target_std: 0.25
  horizon: 5
  lam: 0.95
  gamma: 0.99
  ema_decay: 0.98
  alpha_init: 1.0
  alpha_final: 0.20
  alpha_decay_steps: 250
  entropy_scale: 1.0e-2
  td3bc_alpha: 2.5
  target_aux_coef: 1.50
  trade_aux_coef: 0.15
  band_aux_coef: 0.05
  prior_kl_coef: 0.10
  prior_trade_coef: 0.05
  prior_band_coef: 0.02
  prior_flow_coef: 0.20
  turnover_coef: 0.25
  flow_change_coef: 0.10
  positive_advantages: true
  actor_lr: 3.0e-5
  online_wm_interval: 250
  online_wm_window_days: 30
  online_wm_steps: 10
  use_dsr: true
  adaptive_bc: true
  critic_lr: 3.0e-4
  critic_pretrain_steps: 100
  max_steps: 250
  checkpoint_interval: 125
  val_patience: 2
  bc_loss_threshold: 0.0
  bc_loss_patience: 1
  grad_clip: 100.0

eval:
  pbo_n_trials: 50
  hmm_n_states: 3
  report_metrics:
    - sharpe
    - sortino
    - max_drawdown
    - calmar

logging:
  log_interval: 100
  eval_interval: 125
  checkpoint_dir: "checkpoints/medium_l1_bc_continuous_exec_shortmass_regimebias_shift15_blend625_foldprobe"
